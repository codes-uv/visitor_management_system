<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitors - VisitorHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter','system-ui'] } } } }</script>
  <script>const t=localStorage.getItem('dvms_theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark')</script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-sans text-slate-900 dark:text-slate-100">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-40 w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transform -translate-x-full lg:translate-x-0 transition-transform">
      <div class="h-full flex flex-col">
        <div class="p-6 border-b border-slate-100 dark:border-slate-800">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center"><svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg></div>
            <div><h1 class="font-bold">VisitorHub</h1><p class="text-xs text-slate-500 dark:text-slate-400">Admin Panel</p></div>
          </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
          <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Dashboard</a>
          <a href="visitors.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-indigo-50 dark:bg-indigo-950/50 text-indigo-700 dark:text-indigo-300 font-medium">Visitors</a>
          <a href="dashboard.html#add" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Add Visitor</a>
          <a href="reports.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Reports</a>
        </nav>
      </div>
    </aside>
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <div class="flex-1 min-w-0">
      <header class="sticky top-0 z-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800">
        <div class="flex items-center justify-between px-4 lg:px-8 py-4">
          <div class="flex items-center gap-3">
            <button id="sidebarToggle" class="lg:hidden p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
            <div><h2 class="text-xl lg:text-2xl font-bold">Visitors</h2><p class="text-sm text-slate-500 dark:text-slate-400 hidden sm:block">Manage all visitor records</p></div>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="p-2.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl" data-theme-icon></button>
            <button onclick="document.getElementById('addModal').classList.remove('hidden')" class="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              <span class="hidden sm:inline">Add Visitor</span>
            </button>
          </div>
        </div>
      </header>

      <main class="p-4 lg:p-8">
        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
          <div class="p-4 lg:p-6 border-b border-slate-100 dark:border-slate-800">
            <div class="flex flex-col lg:flex-row gap-4 lg:items-center lg:justify-between">
              <div class="flex-1 max-w-md relative">
                <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input id="searchVisitor" type="text" placeholder="Search by name, mobile, or ID..." class="w-full pl-11 pr-4 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 focus:ring-2 focus:ring-indigo-500">
              </div>
              <select id="statusFilter" class="px-4 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 text-sm">
                <option value="all">All Status</option><option value="active">Active</option><option value="completed">Completed</option>
              </select>
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-slate-50/70 dark:bg-slate-800/50">
                <tr class="text-left text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase">
                  <th class="py-3.5 px-6">Visitor</th><th class="py-3.5 px-4 hidden md:table-cell">Purpose</th><th class="py-3.5 px-4 hidden lg:table-cell">Host</th><th class="py-3.5 px-4">Check-in</th><th class="py-3.5 px-4">Status</th><th class="py-3.5 px-6 text-right">Actions</th>
                </tr>
              </thead>
              <tbody id="visitorsTable" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
            </table>
          </div>

          <div class="p-4 lg:px-6 flex items-center justify-between border-t border-slate-100 dark:border-slate-800">
            <p id="paginationInfo" class="text-sm text-slate-600 dark:text-slate-400">Showing 0 of 0</p>
            <div class="flex items-center gap-2">
              <button id="prevPage" class="px-3 py-1.5 border border-slate-300 dark:border-slate-700 rounded-lg text-sm hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-50">Previous</button>
              <button id="nextPage" class="px-3 py-1.5 border border-slate-300 dark:border-slate-700 rounded-lg text-sm hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-50">Next</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="addModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-900 rounded-3xl max-w-2xl w-full shadow-2xl border border-slate-200 dark:border-slate-800">
      <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
        <h3 class="text-xl font-semibold">Quick Check-In</h3>
        <button onclick="document.getElementById('addModal').classList.add('hidden')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <form id="addVisitorForm" class="p-6 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div><label class="block text-sm font-medium mb-1">Name *</label><input name="name" required class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950"><p class="error-msg text-xs text-red-600 mt-1 hidden">Required</p></div>
          <div><label class="block text-sm font-medium mb-1">Mobile *</label><input name="mobile" required maxlength="10" class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950"><p class="error-msg text-xs text-red-600 mt-1 hidden">Required</p></div>
        </div>
        <div><label class="block text-sm font-medium mb-1">Address *</label><input name="address" required class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950"><p class="error-msg text-xs text-red-600 mt-1 hidden">Required</p></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div><label class="block text-sm font-medium mb-1">Purpose *</label><select name="purpose" required class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950"><option value="">Select</option><option>Interview</option><option>Client Meeting</option><option>Delivery</option><option>Maintenance</option></select><p class="error-msg text-xs text-red-600 mt-1 hidden">Required</p></div>
          <div><label class="block text-sm font-medium mb-1">Person *</label><input name="person" required class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950"><p class="error-msg text-xs text-red-600 mt-1 hidden">Required</p></div>
        </div>
        <div class="flex gap-3 pt-2"><button type="submit" class="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium">Check In</button><button type="button" onclick="document.getElementById('addModal').classList.add('hidden')" class="px-6 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl">Cancel</button></div>
      </form>
    </div>
  </div>

  <div id="visitorModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-900 rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-y-auto border border-slate-200 dark:border-slate-800"><div id="visitorModalContent" class="p-6 lg:p-8"></div></div>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/main.js"></script>
</body>
</html>
