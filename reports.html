<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - VisitorHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui'] } } } }</script>
  <script>const t = localStorage.getItem('dvms_theme'); if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark')</script>
</head>

<body class="bg-slate-50 dark:bg-slate-950 font-sans text-slate-900 dark:text-slate-100 h-full overflow-hidden">

  <div class="flex h-full">

    <aside id="sidebar"
      class="fixed inset-y-0 left-0 z-40 w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transform -translate-x-full lg:translate-x-0 transition-all duration-300 flex flex-col"></aside>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <div id="mainContent" class="flex-1 flex flex-col min-w-0 lg:ml-72 bg-slate-50 dark:bg-slate-950 transition-all duration-300">

      <header
        class="h-[88px] shrink-0 sticky top-0 z-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800">
        <div class="h-full flex items-center justify-between px-4 lg:px-8">
          <div class="flex items-center gap-3 min-w-0">
            <button id="sidebarToggle"
              class="lg:hidden p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl shrink-0">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
            <div class="min-w-0">
              <h2 class="text-xl lg:text-2xl font-bold truncate">Reports & Analytics</h2>
              <p class="text-sm text-slate-500 dark:text-slate-400 hidden sm:block truncate">Visitor insights and trends
              </p>
            </div>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            <button onclick="toggleTheme()"
              class="p-2.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors" data-theme-icon
              title="Toggle theme"></button>
          </div>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
        <div class="max-w-7xl mx-auto space-y-6">

          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>
              <h1 class="text-2xl font-bold">Analytics Overview</h1>
              <p class="text-slate-500 dark:text-slate-400 mt-1">Detailed breakdown of visitor metrics and purposes.</p>
            </div>
          </div>

          <!-- 3.0 METRICS COUNTER CARDS -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6">
              <div class="flex items-center justify-between mb-4">
                <h3 class="text-slate-500 dark:text-slate-400 text-sm font-medium">Total Visitors</h3>
                <div class="p-2 bg-indigo-50 dark:bg-indigo-900/30 rounded-lg text-indigo-600 dark:text-indigo-400">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                  </svg>
                </div>
              </div>
              <p class="text-3xl font-bold" id="dyn-total">0</p>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6">
              <div class="flex items-center justify-between mb-4">
                <h3 class="text-slate-500 dark:text-slate-400 text-sm font-medium">Active Visits</h3>
                <div class="p-2 bg-emerald-50 dark:bg-emerald-900/30 rounded-lg text-emerald-600 dark:text-emerald-400">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                </div>
              </div>
              <p class="text-3xl font-bold" id="dyn-active">0</p>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6">
              <div class="flex items-center justify-between mb-4">
                <h3 class="text-slate-500 dark:text-slate-400 text-sm font-medium">Avg. Duration</h3>
                <div class="p-2 bg-amber-50 dark:bg-amber-900/30 rounded-lg text-amber-600 dark:text-amber-400">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                </div>
              </div>
              <p class="text-3xl font-bold" id="dyn-duration">0<span class="text-lg">m</span></p>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6">
              <div class="flex items-center justify-between mb-4">
                <h3 class="text-slate-500 dark:text-slate-400 text-sm font-medium">Blacklisted</h3>
                <div class="p-2 bg-red-50 dark:bg-red-900/30 rounded-lg text-red-600 dark:text-red-400">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                  </svg>
                </div>
              </div>
              <p class="text-3xl font-bold" id="dyn-blacklisted">0</p>
            </div>
          </div>

          <!-- 4.0 ANALYTICS CHARTS SECTION (Daily Trend & Purpose Breakdown) -->
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <div
              class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6 flex flex-col">
              <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-semibold">Daily Visitor Trend</h3>
                <div class="p-2 bg-indigo-50 dark:bg-indigo-900/30 rounded-lg text-indigo-600 dark:text-indigo-400">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                  </svg>
                </div>
              </div>
              <div class="relative h-[250px] w-full flex items-center justify-center mt-auto">
                <canvas id="visitsChart"></canvas>
              </div>
            </div>

            <div
              class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6 flex flex-col">
              <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-semibold">Visit Purpose Breakdown</h3>
                <div class="p-2 bg-indigo-50 dark:bg-indigo-900/30 rounded-lg text-indigo-600 dark:text-indigo-400">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
                  </svg>
                </div>
              </div>
              <div class="relative h-[250px] w-full flex items-center justify-center mb-6">
                <canvas id="purposeChart"></canvas>
              </div>
              <div id="purposeLegend" class="space-y-4 pt-2 mt-auto border-t border-slate-100 dark:border-slate-800">
              </div>
            </div>

          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="main.js"></script>

  <!-- 5.0 CHARTS INITIALIZATION AND DYNAMIC DATA FETCHING SCRIPT -->
  <script>
    window.addEventListener('load', async function () {
      try {
        // IMPORTANT: Verify this path. If reports.php is in the same folder, 
        // remove 'api/' and just use 'reports.php'
        const response = await fetch('api/reports.php');

        // Get the text first to debug
        const text = await response.text();

        let res;
        try {
          res = JSON.parse(text);
        } catch (e) {
          console.error("CRITICAL: Server returned HTML/Text instead of JSON. The response was:");
          console.error(text); // This will show you the exact error page/message
          throw new Error("Invalid JSON response from server");
        }

        if (res.status === 'success') {
          // --- 1. POPULATE 4 STAT CARDS ---
          document.getElementById('dyn-total').innerText = res.total_visitors || 0;
          document.getElementById('dyn-active').innerText = res.active_visits || 0;
          document.getElementById('dyn-duration').innerHTML = (res.avg_duration || 0) + '<span class="text-lg">m</span>';
          document.getElementById('dyn-blacklisted').innerText = res.blacklisted || 0;

          // ... (The rest of your chart drawing code remains the same) ...
          // --- 2. DRAW DAILY TREND CHART ---
          const ctx1 = document.getElementById('visitsChart');
          if (ctx1 && typeof Chart !== 'undefined') {
            let existingChart1 = Chart.getChart(ctx1);
            if (existingChart1) existingChart1.destroy();

            new Chart(ctx1, {
              type: 'line',
              data: {
                labels: res.trend_labels,
                datasets: [{
                  label: 'Visitors',
                  data: res.trend_values,
                  borderColor: '#4f46e5',
                  backgroundColor: 'rgba(79,70,229,0.1)',
                  tension: 0.4,
                  fill: true
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
              }
            });
          }

          // --- 3. DRAW PURPOSE DOUGHNUT CHART ---
          const ctx2 = document.getElementById('purposeChart');
          const legendContainer = document.getElementById('purposeLegend');

          if (ctx2 && res.chart_data && typeof Chart !== 'undefined') {
            let existingChart2 = Chart.getChart(ctx2);
            if (existingChart2) existingChart2.destroy();

            const chartData = res.chart_data;
            const labels = [];
            const dataValues = [];
            let totalVisits = 0;
            const colors = ['#4f46e5', '#06b6d4', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#f43f5e', '#84cc16'];

            chartData.forEach(item => {
              labels.push(item.purpose ? item.purpose : 'Unspecified');
              const count = parseInt(item.count, 10);
              dataValues.push(count);
              totalVisits += count;
            });

            new Chart(ctx2, {
              type: 'doughnut',
              data: {
                labels: labels,
                datasets: [{
                  data: dataValues,
                  backgroundColor: colors.slice(0, dataValues.length),
                  borderWidth: 0,
                  hoverOffset: 8
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '65%',
                plugins: {
                  legend: { display: false },
                  tooltip: {
                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                    padding: 12,
                    cornerRadius: 8,
                    titleFont: { size: 13 },
                    bodyFont: { size: 13 }
                  }
                }
              }
            });

            if (legendContainer) {
              legendContainer.innerHTML = '';
              chartData.forEach((item, index) => {
                const count = parseInt(item.count, 10);
                const percentage = totalVisits > 0 ? Math.round((count / totalVisits) * 100) : 0;
                const purposeName = item.purpose ? item.purpose : 'Unspecified';
                const colorCode = colors[index % colors.length];

                const html = `
                  <div class="flex items-center justify-between text-sm mt-3">
                    <div class="flex items-center gap-2">
                      <span class="w-3 h-3 rounded-full" style="background-color: ${colorCode}"></span>
                      <span class="text-slate-600 dark:text-slate-400 capitalize">${purposeName}</span>
                    </div>
                    <div class="flex items-center gap-3">
                      <span class="text-slate-500 text-xs">(${count})</span>
                      <span class="font-medium text-slate-900 dark:text-white w-8 text-right">${percentage}%</span>
                    </div>
                  </div>
                `;
                legendContainer.insertAdjacentHTML('beforeend', html);
              });
            }
          }

        } else {
          console.error("API Error:", res.message);
        }
      } catch (err) {
        console.error('Error loading dynamic chart data:', err);
      }
    });
  </script>
</body>

</html>
