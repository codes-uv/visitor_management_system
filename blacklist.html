<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blacklist - VisitorHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui'] } } } }</script>
  <script>const t = localStorage.getItem('dvms_theme'); if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark')</script>
</head>

<body class="bg-slate-50 dark:bg-slate-950 font-sans text-slate-900 dark:text-slate-100 h-full overflow-hidden">
  <div class="flex h-full">
    <!-- SIDEBAR - FIXED -->
    <aside id="sidebar"
      class="fixed inset-y-0 left-0 z-40 w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transform -translate-x-full lg:translate-x-0 transition-all duration-300 flex flex-col"></aside>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <!-- MAIN CONTENT - Scrollable -->
    <div id="mainContent" class="flex-1 lg:ml-72 flex flex-col h-full min-w-0 transition-all duration-300">
      <!-- Header -->
      <header
        class="h-[88px] shrink-0 sticky top-0 z-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800">
        <div class="h-full flex items-center justify-between px-4 lg:px-8">
          <div class="flex items-center gap-3 min-w-0">
            <button id="sidebarToggle"
              class="lg:hidden p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl shrink-0">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
            <div class="min-w-0">
              <h2 class="text-xl lg:text-2xl font-bold truncate">Blacklist</h2>
              <p class="text-sm text-slate-500 dark:text-slate-400 hidden sm:block truncate">Manage blocked visitors and security alerts</p>
            </div>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            <button onclick="toggleTheme()"
              class="p-2.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors" data-theme-icon
              title="Toggle theme"></button>
            <a href="visitors.html"
              class="hidden sm:flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium shadow-lg shadow-indigo-600/20 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
              </svg>
              <span>New Visitor</span>
            </a>
          </div>
        </div>
      </header>

      <!-- Scrollable Content Area -->
      <main class="flex-1 overflow-y-auto overflow-x-hidden">
        <div class="p-4 lg:p-8">
          <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <!-- 3.1 BLACKLIST MANAGEMENT TABLE -->
            <div class="xl:col-span-2 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
              <div class="p-6 border-b border-slate-100 dark:border-slate-800">
                <h3 class="text-xl font-semibold">Blacklist Management</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400 mt-0.5">List of blacklisted visitors</p>
              </div>
              <div class="overflow-x-auto">
                <table class="w-full">
                  <thead class="bg-slate-50/50 dark:bg-slate-800/50">
                    <tr class="text-left text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wider">
                      <th class="py-3.5 px-6">Visitor</th>
                      <th class="py-3.5 px-4">Mobile</th>
                      <th class="py-3.5 px-4">Reason</th>
                      <th class="py-3.5 px-6">Action</th>
                    </tr>
                  </thead>
                  <tbody id="blacklistTable" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
                </table>
              </div>
            </div>

            <!-- 3.2 ADD BLOCK DETAILS PANEL (Form & Autofill Dropdown) -->
            <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6 h-fit shadow-sm">
              <h4 class="font-semibold text-lg mb-4 text-slate-800 dark:text-slate-200">Add to Blacklist</h4>
              <form id="blacklistForm" class="space-y-4">
                <!-- 3.2.1 AUTOCOMPLETE VISITOR SEARCH DROPDOWN -->
                <div class="relative">
                  <label class="block text-sm font-medium mb-1 text-slate-600 dark:text-slate-400">Select Existing Visitor (Optional)</label>
                  <div class="relative">
                    <input id="visitorSearchSelect" type="text" placeholder="Search by name or mobile..." autocomplete="off"
                      class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                    <button id="clearVisitorSelect" type="button" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hidden">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                  </div>
                  <div id="visitorDropdownList" class="absolute left-0 right-0 mt-1 max-h-60 overflow-y-auto bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-xl z-50 hidden divide-y divide-slate-100 dark:divide-slate-850">
                    <!-- Dynamic options -->
                  </div>
                </div>
                <div>
                  <label class="block text-sm font-medium mb-1">Name *</label>
                  <input name="name" required placeholder="Visitor's name"
                    class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none">
                </div>
                <div>
                  <label class="block text-sm font-medium mb-1">Mobile *</label>
                  <input name="mobile" required placeholder="10-digit mobile" maxlength="10"
                    class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none">
                </div>
                <div>
                  <label class="block text-sm font-medium mb-1">Reason *</label>
                  <textarea name="reason" required rows="3" placeholder="Reason for blacklisting"
                    class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-950 focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none"></textarea>
                </div>
                <button type="submit" class="w-full py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-xl font-medium shadow-lg shadow-red-600/20 transition-colors">
                  Add to Blacklist
                </button>
              </form>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="main.js"></script>
</body>

</html>
